name: Temporary V2Ray Exit Node

on:
  workflow_dispatch:   # manual trigger

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours

    steps:
      - name: Generate random UUID for VMess
        id: genuuid
        run: echo "UUID=$(uuidgen)" >> $GITHUB_OUTPUT

      - name: Create V2Ray config
        run: |
          cat <<EOF > config.json
          {
            "inbounds": [{
              "port": 10000,
              "listen": "127.0.0.1",
              "protocol": "vmess",
              "settings": {
                "clients": [{
                  "id": "${{ steps.genuuid.outputs.UUID }}",
                  "alterId": 0
                }]
              },
              "streamSettings": {
                "network": "tcp"
              }
            }],
            "outbounds": [{
              "protocol": "freedom",
              "settings": {}
            }]
          }
          EOF

      - name: Start V2Ray (Xray) container
        run: |
          docker run -d --name v2ray \
            -v ${{ github.workspace }}/config.json:/etc/xray/config.json \
            -p 127.0.0.1:10000:10000 \
            teddysun/xray:latest

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/gh_action_key
          chmod 600 ~/.ssh/gh_action_key

      - name: Establish reverse tunnel
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
              -o ServerAliveInterval=60 \
              -i ~/.ssh/gh_action_key \
              -p ${{ secrets.VPS_SSH_PORT }} \
              -N -R '*:8080:127.0.0.1:10000' \
              actions@${{ secrets.VPS_HOST }} &
          echo "SSH tunnel PID: $!"
          # give it a second to come up
          sleep 2

      - name: Print access link
        run: |
          UUID='${{ steps.genuuid.outputs.UUID }}'
          DOMAIN='${{ secrets.VPS_DOMAIN }}'
          # Build a VMess link (base64-encoded JSON)
          JSON=$(printf '{"v":"2","ps":"GitHubActions","add":"%s","port":"8080","id":"%s","aid":"0","net":"tcp","type":"none","host":"","path":"","tls":""}' "$DOMAIN" "$UUID")
          BASE64=$(echo -n "$JSON" | base64 -w0)
          echo "vmess://$BASE64"
          echo "::notice::Your temporary VPN link: vmess://$BASE64"

      - name: Keep alive until timeout
        run: sleep infinity
